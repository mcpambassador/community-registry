schema_version: "1.0"

registry:
  name: "MCP Ambassador Community Registry"
  description: "Curated MCP servers for MCP Ambassador"
  maintainer: "MCP Ambassador"
  url: "https://github.com/mcpambassador/community-registry"
  updated_at: "2026-02-23T00:00:00Z"

mcps:
  - name: github
    display_name: "GitHub"
    description: "GitHub's official MCP Server. Provides tools for repos, issues, PRs, code search, notifications, and user management."
    icon_url: "https://github.githubassets.com/favicons/favicon.svg"
    transport_type: http
    config:
      url: "https://api.githubcopilot.com/mcp/"
    auth_type: oauth2
    oauth_config:
      auth_url: "https://github.com/login/oauth/authorize"
      token_url: "https://github.com/login/oauth/access_token"
      scopes: "read:user repo"
      client_id_env: "GITHUB_OAUTH_CLIENT_ID"
      client_secret_env: "GITHUB_OAUTH_CLIENT_SECRET"
      access_token_env_var: "GITHUB_ACCESS_TOKEN"
    isolation_mode: per_user
    requires_user_credentials: true
    tags: ["developer-tools", "version-control", "official"]
    category: "Developer Tools"
    repository_url: "https://github.com/github/github-mcp-server"
    documentation_url: "https://github.com/github/github-mcp-server#readme"
    version: "1.0.0"
    maintainer: "GitHub"
    verified: true

  - name: context7
    display_name: "Context7"
