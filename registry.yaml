- name: airtable-mcp-server
  display_name: Airtable
  description: Provides AI assistants with direct access to Airtable bases, allowing
    them to read schemas, query records, and interact with your Airtable data. Supports
    listing bases, retrieving table structures, and searching through records to help
    automate workflows and answer questions about your organized data.
  icon_url: https://www.google.com/s2/favicons?domain=airtable.com&sz=64
  transport_type: stdio
  config:
    command:
    - npx
    - -y
    - airtable-mcp-server@1.13.0
    env_vars:
    - name: AIRTABLE_API_KEY
      description: Airtable Api Key
      required: true
    - name: nodeenv
      description: Nodeenv
      required: false
  auth_type: static
  requires_user_credentials: true
  credential_schema:
    properties:
      AIRTABLE_API_KEY:
        title: Airtable Api Key
        type: string
      nodeenv:
        title: Nodeenv
        type: string
    required:
    - AIRTABLE_API_KEY
    type: object
  isolation_mode: per_user
  tags:
  - productivity
  category: Productivity
  repository_url: https://github.com/domdomegg/airtable-mcp-server
  maintainer: Community
  verified: false
  version: 1.0.0
