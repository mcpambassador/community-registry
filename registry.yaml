    repository_url: "https://github.com/anthropics/anthropic-quickstarts/tree/main/mcp-server-puppeteer"
    documentation_url: "https://pptr.dev/"
    version: "1.0.0"
    maintainer: "Anthropic"
    verified: true

  - name: sequential-thinking
    display_name: "Sequential Thinking"
    description: "Dynamic, reflective problem-solving through sequential thinking. Break down complex problems into manageable steps with revision and branching."
    icon_url: null
    transport_type: stdio
