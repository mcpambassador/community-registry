- name: aws-kb-retrieval
  display_name: AWS Knowledge Base
  description: Retrieve information from AWS Bedrock Knowledge Bases. Query knowledge
    bases for RAG-powered responses.
  transport_type: stdio
  config:
    command:
    - npx
    - -y
    - '@modelcontextprotocol/server-aws-kb-retrieval@0.6.2'
    env:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
  auth_type: static
  requires_user_credentials: true
  credential_schema:
    type: object
    properties:
      AWS_ACCESS_KEY_ID:
        type: string
        title: AWS Access Key ID
        description: Your AWS Access Key ID
      AWS_SECRET_ACCESS_KEY:
        type: string
        title: AWS Secret Access Key
        description: Your AWS Secret Access Key
      AWS_REGION:
        type: string
        title: AWS Region
        description: AWS region (e.g., us-west-2)
    required:
    - AWS_ACCESS_KEY_ID
    - AWS_SECRET_ACCESS_KEY
    - AWS_REGION
  isolation_mode: per_user
  tags:
  - aws
  - cloud
  - knowledge-base
  - rag
  category: Developer Tools
  repository_url: https://www.npmjs.com/package/@modelcontextprotocol/server-aws-kb-retrieval
  maintainer: MCP Project
  verified: true
  version: 1.0.0
