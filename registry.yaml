  - name: exa
    display_name: "Exa"
    description: "AI-powered web search with neural search capabilities. Find relevant content using meaning-based search, not just keywords."
    icon_url: "https://exa.ai/favicon.ico"
    transport_type: stdio
    config:
      command: ["npx", "-y", "exa-mcp-server"]
