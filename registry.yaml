    isolation_mode: per_user
    tags: ["search", "web", "privacy"]
    category: "Search & Web"
    repository_url: "https://github.com/anthropics/anthropic-quickstarts/tree/main/mcp-server-brave-search"
    documentation_url: "https://brave.com/search/api/"
    version: "1.0.0"
    maintainer: "Anthropic"
    verified: true

  - name: fetch
    display_name: "Fetch"
    description: "Fetch and convert web content to markdown. Retrieve any URL and get clean, readable content for LLM processing."
    icon_url: null
    transport_type: stdio
    config:
      command: ["npx", "-y", "@anthropic/mcp-server-fetch"]
    auth_type: none
    isolation_mode: shared
    requires_user_credentials: false
    tags: ["web", "fetch", "markdown", "utility"]
    category: "Utilities"
    repository_url: "https://github.com/anthropics/anthropic-quickstarts/tree/main/mcp-server-fetch"
    documentation_url: "https://github.com/anthropics/anthropic-quickstarts/tree/main/mcp-server-fetch#readme"
    version: "1.0.0"
    maintainer: "Anthropic"
    verified: true

  - name: puppeteer
    display_name: "Puppeteer"
    description: "Browser automation using Puppeteer. Navigate pages, take screenshots, fill forms, and extract content from websites."
    icon_url: "https://pptr.dev/img/puppeteer.png"
    transport_type: stdio
    config:
      command: ["npx", "-y", "@anthropic/mcp-server-puppeteer"]
    auth_type: none
    isolation_mode: shared
    requires_user_credentials: false
    tags: ["browser", "automation", "screenshots", "web"]
