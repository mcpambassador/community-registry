- name: arxiv-mcp-server
  display_name: ArXiv
  description: "The ArXiv MCP Server provides a comprehensive bridge between AI assistants\
    \ and arXiv's research repository through the Model Context Protocol (MCP). \n\
    \nFeatures:\n• Search arXiv papers with advanced filtering\n• Download and store\
    \ papers locally as markdown\n• Read and analyze paper content\n• Deep research\
    \ analysis prompts\n• Local paper management and storage\n• Enhanced tool descriptions\
    \ optimized for local AI models\n• Docker MCP Gateway compatible with detailed\
    \ context\n\nPerfect for researchers, academics, and AI assistants conducting\
    \ literature reviews and research analysis.\n\n**Recent Update**: Enhanced tool\
    \ descriptions specifically designed to resolve local AI model confusion and improve\
    \ Docker MCP Gateway compatibility.\n"
  icon_url: https://avatars.githubusercontent.com/u/15390319?v=4
  transport_type: stdio
  config:
    command:
    - npx
    - -y
    - arxiv-mcp-server@0.1.5
    env_vars:
    - name: storage_path
      description: Directory path where downloaded papers will be stored
      required: true
  auth_type: none
  requires_user_credentials: true
  credential_schema:
    properties:
      storage_path:
        description: Directory path where downloaded papers will be stored
        title: Storage path
        type: string
    required:
    - storage_path
    type: object
  isolation_mode: per_user
  tags:
  - arxiv
  - research
  - academic
  - papers
  - search
  - ai
  - local-models
  - docker-gateway
  - enhanced-descriptions
  category: Data & Search
  repository_url: https://github.com/jasonleinart/arxiv-mcp-server
  maintainer: Community
  verified: false
  version: 1.0.0
