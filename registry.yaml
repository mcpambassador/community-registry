schema_version: "1.0"

registry:
  name: "MCP Ambassador Community Registry"
  description: "Curated MCP servers for MCP Ambassador"
  maintainer: "zervin"
  url: "https://github.com/zervin/mcpambassador_community_mcps"
  updated_at: "2026-02-23T00:00:00Z"

mcps:
  - name: github
    display_name: "GitHub"
    description: "GitHub's official MCP Server. Provides tools for repos, issues, PRs, code search, notifications, and user management."
    icon_url: "https://github.githubassets.com/favicons/favicon.svg"
    transport_type: http
    config:
      url: "https://api.githubcopilot.com/mcp/"
    auth_type: oauth2
    oauth_config:
      auth_url: "https://github.com/login/oauth/authorize"
      token_url: "https://github.com/login/oauth/access_token"
      scopes: "read:user repo"
      client_id_env: "GITHUB_OAUTH_CLIENT_ID"
      client_secret_env: "GITHUB_OAUTH_CLIENT_SECRET"
      access_token_env_var: "GITHUB_ACCESS_TOKEN"
    isolation_mode: per_user
    requires_user_credentials: false
    tags: ["developer-tools", "version-control", "official"]
    category: "Developer Tools"
    repository_url: "https://github.com/github/github-mcp-server"
    documentation_url: "https://github.com/github/github-mcp-server#readme"
    version: "1.0.0"
    maintainer: "GitHub"
    verified: true

  - name: context7
    display_name: "Context7"
    description: "Up-to-date documentation and code examples for any library. Powered by Upstash."
    icon_url: "https://context7.com/favicon.ico"
    transport_type: stdio
    config:
      command: ["npx", "-y", "@upstash/context7-mcp@latest"]
    auth_type: none
    isolation_mode: shared
    requires_user_credentials: false
    tags: ["documentation", "developer-tools", "libraries"]
    category: "Developer Tools"
    repository_url: "https://github.com/upstash/context7"
    documentation_url: "https://context7.com/"
    version: "2.1.1"
    maintainer: "Upstash"
    verified: true

  - name: alpha-vantage
    display_name: "Alpha Vantage"
    description: "Real-time and historical financial market data, including stocks, forex, and cryptocurrency."
    icon_url: "https://www.alphavantage.co/static/img/favicon.ico"
    transport_type: http
    config:
      url: "https://mcp.alphavantage.co/mcp?apikey=${ALPHA_VANTAGE_API_KEY}"
    auth_type: static
    requires_user_credentials: true
    credential_schema:
      type: object
      properties:
        ALPHA_VANTAGE_API_KEY:
          type: string
          title: "API Key"
          description: "Your Alpha Vantage API key (free at alphavantage.co)"
      required:
        - ALPHA_VANTAGE_API_KEY
    isolation_mode: per_user
    tags: ["finance", "stocks", "data", "api"]
    category: "Finance & Data"
    repository_url: "https://github.com/alphavantage/mcp"
    documentation_url: "https://www.alphavantage.co/documentation/"
    version: "1.0.0"
    maintainer: "Alpha Vantage"
    verified: true

  - name: tavily-search
    display_name: "Tavily Search"
    description: "AI-optimized web search API. Returns clean, relevant search results and extracted content."
    transport_type: stdio
    config:
      command: ["npx", "-y", "tavily-mcp@latest"]
      env:
        TAVILY_API_KEY: "${TAVILY_API_KEY}"
    auth_type: static
    requires_user_credentials: true
    credential_schema:
      type: object
      properties:
        TAVILY_API_KEY:
          type: string
          title: "API Key"
          description: "Your Tavily API key (get one at tavily.com)"
      required:
        - TAVILY_API_KEY
    isolation_mode: per_user
    tags: ["search", "web", "ai", "api"]
    category: "Search & Web"
    documentation_url: "https://docs.tavily.com/"
    version: "0.2.17"
    maintainer: "Tavily"
    verified: true

  - name: filesystem
    display_name: "Filesystem"
    description: "MCP reference server for secure file system access. Read, write, list, and search files within allowed directories."
    transport_type: stdio
    config:
      command: ["npx", "-y", "@modelcontextprotocol/server-filesystem", "/allowed/path"]
    auth_type: none
    isolation_mode: shared
    requires_user_credentials: false
    tags: ["files", "filesystem", "reference", "utility"]
    category: "Utilities"
    repository_url: "https://github.com/modelcontextprotocol/servers/tree/main/src/filesystem"
    documentation_url: "https://github.com/modelcontextprotocol/servers#filesystem"
    version: "1.0.0"
    maintainer: "MCP Project"
    verified: true

  - name: notion
    display_name: "Notion"
    description: "Notion's official MCP server. Search pages, create content, manage databases, and more."
    icon_url: "https://www.notion.so/images/favicon.ico"
    transport_type: stdio
    config:
      command: ["npx", "-y", "@notionhq/notion-mcp-server"]
      env:
        OPENAPI_MCP_HEADERS: '{"Authorization": "Bearer ${NOTION_API_KEY}", "Notion-Version": "2022-06-28"}'
    auth_type: static
    requires_user_credentials: true
    credential_schema:
      type: object
      properties:
        NOTION_API_KEY:
          type: string
          title: "Notion Integration Token"
          description: "Your Notion internal integration token (create at notion.so/my-integrations)"
      required:
        - NOTION_API_KEY
    isolation_mode: per_user
    tags: ["productivity", "notes", "databases", "official"]
    category: "Productivity"
    repository_url: "https://github.com/makenotion/notion-mcp-server"
    documentation_url: "https://github.com/makenotion/notion-mcp-server#readme"
    version: "1.0.0"
    maintainer: "Notion"
    verified: true

  - name: firecrawl
    display_name: "Firecrawl"
    description: "Turn websites into LLM-ready data. Scrape, crawl, and extract clean markdown or structured data from any URL."
    icon_url: "https://www.firecrawl.dev/favicon.ico"
    transport_type: stdio
    config:
      command: ["npx", "-y", "firecrawl-mcp"]
      env:
        FIRECRAWL_API_KEY: "${FIRECRAWL_API_KEY}"
    auth_type: static
    requires_user_credentials: true
    credential_schema:
      type: object
      properties:
        FIRECRAWL_API_KEY:
          type: string
          title: "API Key"
          description: "Your Firecrawl API key (get one at firecrawl.dev)"
      required:
        - FIRECRAWL_API_KEY
    isolation_mode: per_user
    tags: ["web-scraping", "crawling", "data-extraction"]
    category: "Data & Web Scraping"
    repository_url: "https://github.com/mendableai/firecrawl-mcp-server"
    documentation_url: "https://docs.firecrawl.dev/"
    version: "1.0.0"
    maintainer: "Mendable"
    verified: true

  - name: brave-search
    display_name: "Brave Search"
    description: "Web and local search using the Brave Search API. Get clean search results optimized for AI consumption."
    icon_url: "https://brave.com/static-assets/images/brave-logo-sans-text.svg"
