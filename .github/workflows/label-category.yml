name: Auto-Label by Category

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]
    paths:
      - 'registry.yaml'

jobs:
  label-category:
    name: Label PR by MCP category
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install js-yaml
        run: npm install --no-save js-yaml

      - name: Detect additions and label
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const yaml = require(require.resolve('js-yaml', { paths: [process.cwd()] }));
            const fs = require('fs');

            // Category → label mapping
            const CATEGORY_LABELS = {
              'Developer Tools':        'category: developer-tools',
              'Productivity':           'category: productivity',
              'Data & Analytics':       'category: data-analytics',
              'Communication':          'category: communication',
              'AI & ML':                'category: ai-ml',
              'Security':               'category: security',
              'Infrastructure':         'category: infrastructure',
              'Finance':                'category: finance',
              'Media & Entertainment':  'category: media',
              'Education':              'category: education',
              'E-commerce':             'category: ecommerce',
              'Other':                  'category: other'
            };

            const transport_labels = {
              'http': 'transport: http',
              'stdio': 'transport: stdio'
            };

            const auth_labels = {
              'none': 'auth: none',
              'static': 'auth: static',
              'oauth2': 'auth: oauth2'
            };

            try {
              const registry = yaml.load(fs.readFileSync('registry.yaml', 'utf8'));
              const labelsToAdd = new Set(['registry-pr']);

              for (const mcp of registry.mcps || []) {
                if (mcp.category && CATEGORY_LABELS[mcp.category]) {
                  labelsToAdd.add(CATEGORY_LABELS[mcp.category]);
                }
                if (mcp.transport_type && transport_labels[mcp.transport_type]) {
                  labelsToAdd.add(transport_labels[mcp.transport_type]);
                }
                if (mcp.auth_type && auth_labels[mcp.auth_type]) {
                  labelsToAdd.add(auth_labels[mcp.auth_type]);
                }
                if (mcp.verified) {
                  labelsToAdd.add('verified-entry');
                }
              }

              // Ensure labels exist before adding (create if needed)
              for (const label of labelsToAdd) {
                try {
                  await github.rest.issues.getLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label
                  });
                } catch (e) {
                  if (e.status === 404) {
                    const color = label.startsWith('category:') ? '0075ca' :
                                  label.startsWith('transport:') ? 'e4e669' :
                                  label.startsWith('auth:') ? 'd93f0b' : 'cfd3d7';
                    await github.rest.issues.createLabel({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      name: label,
                      color
                    }).catch(() => {});
                  }
                }
              }

              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: Array.from(labelsToAdd)
              });

            } catch (e) {
              console.log('Could not parse registry.yaml for labels:', e.message);
            }
