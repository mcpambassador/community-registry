name: Report Registry Issue
description: Report an incorrect, broken, or malicious registry entry
labels: ["registry-issue", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form to report problems with existing registry entries.

        **Reporting a security issue with an entry?** If the MCP itself may be malicious or compromised, please use GitHub's [private vulnerability reporting](../../security/advisories/new) for responsible disclosure.

  - type: input
    id: entry-name
    attributes:
      label: Entry Name (the `name` field)
      description: Which registry entry has an issue?
      placeholder: "e.g. github, context7"
    validations:
      required: true

  - type: dropdown
    id: issue-type
    attributes:
      label: Issue Type
      options:
        - Incorrect/outdated information (URL, auth config, etc.)
        - Entry is broken / MCP no longer works
        - Entry appears malicious or suspicious
        - Duplicate entry
        - Schema validation would fail on this entry
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is wrong with this entry? What should it be?
    validations:
      required: true

  - type: checkboxes
    id: willing-to-pr
    attributes:
      label: Fix
      options:
        - label: I am willing to open a PR to fix this entry
